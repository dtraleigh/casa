{% extends 'base.html' %}
{% block title %}Mycroft{% endblock %}

{% block content %}
{% csrf_token %}
<div id="chat-wrap" class="container-fluid px-3 px-lg-4 py-3 d-flex flex-column">
    <div class="card shadow-sm flex-grow-1 d-flex flex-column overflow-hidden">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <span class="fw-bold">Mycroft</span>
            <div class="d-flex align-items-center gap-2">
                <label for="width-select" class="small text-white-50 mb-0">Width</label>
                <select id="width-select" class="form-select form-select-sm w-auto">
                    <option value="narrow">Narrow</option>
                    <option value="medium">Medium</option>
                    <option value="wide">Wide</option>
                    <option value="full">Full</option>
                </select>
            </div>
        </div>
        <div id="messages" class="card-body overflow-auto flex-grow-1">
            <div class="text-muted small text-center my-auto">
                Say something to start. This conversation resets when you
                reload the page.
            </div>
        </div>
        <div class="card-footer">
            <form id="chat-form" class="input-group align-items-end">
                <textarea id="chat-input" class="form-control" rows="1"
                          placeholder="Message Mycroft…" autocomplete="off"
                          style="resize: none; max-height: 40vh;"
                          autofocus></textarea>
                <button id="send-btn" class="btn btn-primary" type="submit">
                    Send
                </button>
            </form>
            <div class="form-text small mt-1">
                Enter to send · Shift+Enter for a new line
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const csrftoken = document.querySelector('[name=csrfmiddlewaretoken]').value;
    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesEl = document.getElementById('messages');

    // Running history for this page load — sent in full on every turn.
    const messages = [];
    let firstMessage = true;

    // Fill the viewport below the navbar. Measure the navbar rather than
    // hardcoding its height — it changes with breakpoint and font metrics.
    const chatWrap = document.getElementById('chat-wrap');
    function sizeChat() {
        const nav = document.querySelector('.navbar');
        const navH = nav ? nav.offsetHeight : 0;
        chatWrap.style.height = (window.innerHeight - navH) + 'px';
    }
    window.addEventListener('resize', sizeChat);
    sizeChat();

    // Chat width, remembered per browser. 'full' leaves the wrapper edge-to-edge;
    // the others cap max-width and centre it. sizeChat() still handles height.
    const WIDTHS = { narrow: '720px', medium: '1000px', wide: '1400px', full: '' };
    const widthSelect = document.getElementById('width-select');
    function applyWidth(key) {
        const mw = WIDTHS[key] || '';
        chatWrap.style.maxWidth = mw;
        chatWrap.style.marginLeft = mw ? 'auto' : '';
        chatWrap.style.marginRight = mw ? 'auto' : '';
    }
    const savedWidth = localStorage.getItem('mycroft-chat-width') || 'full';
    widthSelect.value = savedWidth;
    applyWidth(savedWidth);
    widthSelect.addEventListener('change', function () {
        localStorage.setItem('mycroft-chat-width', widthSelect.value);
        applyWidth(widthSelect.value);
    });

    function addBubble(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = 'd-flex mb-3 ' +
            (role === 'user' ? 'justify-content-end' : 'justify-content-start');
        const bubble = document.createElement('div');
        bubble.className = 'p-2 px-3 rounded ' +
            (role === 'user' ? 'bg-primary text-white' : 'bg-light border');
        bubble.style.maxWidth = '80%';
        bubble.style.whiteSpace = 'pre-wrap';
        bubble.textContent = text;
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
    }

    function addNotice(text) {
        const notice = document.createElement('div');
        notice.className = 'text-danger small text-center mb-3';
        notice.textContent = text;
        messagesEl.appendChild(notice);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Copy to clipboard. navigator.clipboard only exists in a secure context
    // (https or localhost); over plain http on the LAN it's undefined, so fall
    // back to a hidden textarea + execCommand.
    function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            let ok;
            try {
                ok = document.execCommand('copy');
            } catch (e) {
                ok = false;
            }
            document.body.removeChild(ta);
            ok ? resolve() : reject();
        });
    }

    // Split assistant text into plain-text and fenced-code (```lang) segments.
    // Runs on the accumulated text every token, so it must tolerate a fence
    // that hasn't closed yet — an in-progress block renders as code as it
    // streams and simply completes when the closing fence arrives.
    function parseSegments(text) {
        const segments = [];
        let i = 0;
        while (i < text.length) {
            const fenceStart = text.indexOf('```', i);
            if (fenceStart === -1) {
                segments.push({ type: 'text', content: text.slice(i) });
                break;
            }
            if (fenceStart > i) {
                segments.push({ type: 'text', content: text.slice(i, fenceStart) });
            }
            // Language sits on the rest of the opening-fence line.
            const langEnd = text.indexOf('\n', fenceStart + 3);
            if (langEnd === -1) {
                // Opening fence with no newline yet — still streaming the lang.
                segments.push({ type: 'code', lang: text.slice(fenceStart + 3).trim(), content: '' });
                break;
            }
            const lang = text.slice(fenceStart + 3, langEnd).trim();
            const bodyStart = langEnd + 1;
            const fenceEnd = text.indexOf('```', bodyStart);
            if (fenceEnd === -1) {
                // Unterminated block — render what we have so far.
                segments.push({ type: 'code', lang: lang, content: text.slice(bodyStart) });
                break;
            }
            let code = text.slice(bodyStart, fenceEnd);
            if (code.endsWith('\n')) code = code.slice(0, -1);  // drop the newline before the closing fence
            segments.push({ type: 'code', lang: lang, content: code });
            i = fenceEnd + 3;
        }
        return segments;
    }

    function makeCodeBlock(code, lang) {
        const container = document.createElement('div');
        container.className = 'my-2 rounded overflow-hidden border';

        const header = document.createElement('div');
        header.className = 'd-flex justify-content-between align-items-center px-3 py-1';
        header.style.background = '#2d2d2d';
        header.style.color = '#ccc';
        header.style.fontSize = '0.75rem';

        const label = document.createElement('span');
        label.textContent = lang || 'code';
        header.appendChild(label);

        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'btn btn-sm btn-outline-light py-0 px-2';
        copyBtn.style.fontSize = '0.75rem';
        copyBtn.textContent = 'Copy';
        copyBtn.addEventListener('click', function () {
            copyText(code).then(function () {
                copyBtn.textContent = 'Copied!';
            }).catch(function () {
                copyBtn.textContent = 'Failed';
            });
            setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
        });
        header.appendChild(copyBtn);

        const pre = document.createElement('pre');
        pre.className = 'mb-0 p-3';
        pre.style.background = '#1e1e1e';
        pre.style.color = '#f8f8f2';
        pre.style.overflowX = 'auto';
        pre.style.whiteSpace = 'pre';
        const codeEl = document.createElement('code');
        codeEl.textContent = code;
        pre.appendChild(codeEl);

        container.appendChild(header);
        container.appendChild(pre);
        return container;
    }

    // Render assistant text into the bubble, turning fenced code into copyable
    // blocks. Everything is set via textContent — model output is never treated
    // as HTML. Re-run wholesale on each token (cheap for a single-user app).
    function renderMessage(bubble, text) {
        bubble.textContent = '';
        for (const seg of parseSegments(text)) {
            if (seg.type === 'code') {
                bubble.appendChild(makeCodeBlock(seg.content, seg.lang));
            } else {
                const cleaned = seg.content.replace(/^\n+|\n+$/g, '');
                if (!cleaned) continue;
                const span = document.createElement('span');
                span.textContent = cleaned;
                bubble.appendChild(span);
            }
        }
    }

    // Touch devices: focusing the textarea pops the on-screen keyboard, so
    // don't auto-focus after a reply — let the user tap to type. Desktop keeps
    // the convenience of a ready-to-type field.
    const hasTouchKeyboard = window.matchMedia('(pointer: coarse)').matches;

    function setBusy(busy) {
        input.disabled = busy;
        sendBtn.disabled = busy;
        if (!busy && !hasTouchKeyboard) input.focus();
    }

    // Grow the textarea to fit its content (capped by max-height in CSS, after
    // which it scrolls). Reset to 'auto' first so it can shrink as well as grow.
    function autoGrow() {
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
    }
    input.addEventListener('input', autoGrow);

    // Enter sends; Shift+Enter inserts a newline (the browser default).
    input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
        }
    });

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        if (firstMessage) {
            messagesEl.innerHTML = '';
            firstMessage = false;
        }

        const userBubble = addBubble('user', text);
        messages.push({ role: 'user', content: text });
        input.value = '';
        autoGrow();  // collapse back to a single row
        setBusy(true);

        const assistantBubble = addBubble('assistant', '');
        // Pin the just-sent message near the top of the view so the reply
        // streams into the space below it. We deliberately do NOT auto-scroll
        // as tokens arrive — that would drag the view down through a long
        // response and force the reader back up to the start.
        userBubble.parentElement.scrollIntoView({ block: 'start' });
        let assistantText = '';
        let completed = false;
        let notice = null;

        try {
            const resp = await fetch('/mycroft/send/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                },
                body: JSON.stringify({ messages: messages }),
            });

            if (!resp.ok) {
                throw new Error('Request failed: ' + resp.status);
            }

            // Read newline-delimited JSON frames. Anything that isn't a frame
            // we recognise is discarded rather than shown — a killed worker or
            // a proxy can write an error page onto this connection, and it must
            // never reach the chat bubble or the history.
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });

                const lines = buffer.split('\n');
                buffer = lines.pop();  // trailing partial line, if any

                for (const line of lines) {
                    if (!line.trim()) continue;
                    let frame;
                    try {
                        frame = JSON.parse(line);
                    } catch (e) {
                        continue;  // not ours — ignore it
                    }
                    if (frame.type === 'token') {
                        assistantText += frame.content;
                        renderMessage(assistantBubble, assistantText);
                    } else if (frame.type === 'error') {
                        notice = 'Mycroft hit an error and stopped.';
                    } else if (frame.type === 'done') {
                        completed = true;
                    }
                }
            }
        } catch (err) {
            notice = 'Could not reach Mycroft. Check that Ollama is running.';
        }

        if (!completed && !notice) {
            notice = 'Mycroft was cut off mid-response.';
        }

        if (assistantText) {
            messages.push({ role: 'assistant', content: assistantText });
        } else {
            // Nothing usable came back — drop the user turn so the next send
            // doesn't repeat it against a half-formed history.
            messages.pop();
        }

        if (notice) addNotice(notice);
        setBusy(false);
    });
});
</script>
{% endblock %}
